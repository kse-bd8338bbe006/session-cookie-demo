<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Session Cookie Demo</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid #ddd; padding-bottom: 12px; }
        h1 { margin: 0; font-size: 22px; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .new-note { margin-bottom: 24px; padding: 16px; background: #f5f5f5; border-radius: 6px; }
        .new-note form { display: flex; flex-direction: column; gap: 8px; }
        .new-note input, .new-note textarea {
            padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; font-family: sans-serif;
        }
        .new-note textarea { min-height: 60px; resize: vertical; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-primary:hover { background: #1557b0; }
        .btn-danger { background: #d32f2f; color: white; font-size: 12px; padding: 4px 10px; }
        .btn-danger:hover { background: #b71c1c; }
        .btn-logout { background: #757575; color: white; text-decoration: none; padding: 6px 14px; border-radius: 4px; font-size: 13px; }
        .btn-logout:hover { background: #616161; }
        .note-card { border: 1px solid #ddd; border-radius: 6px; padding: 12px 16px; margin-bottom: 12px; }
        .note-header { display: flex; justify-content: space-between; align-items: center; }
        .note-header h3 { margin: 0; }
        .note-date { color: #888; font-size: 12px; }
        .note-content { margin-top: 8px; white-space: pre-wrap; }
        .empty { color: #888; text-align: center; padding: 40px 0; }
    </style>
</head>
<body>
    <header>
        <h1>My Notes</h1>
        <div class="user-info">
            <span>Logged in as <strong th:text="${username}">user</strong></span>
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="btn-logout">Log out</button>
            </form>
        </div>
    </header>

    <div class="new-note">
        <form th:action="@{/notes}" method="post">
            <input type="text" name="title" placeholder="Title" required>
            <textarea name="content" placeholder="Content"></textarea>
            <button type="submit" class="btn btn-primary">Add note</button>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(notes)}" class="empty">
        No notes yet. Create one above.
    </div>

    <div th:each="note : ${notes}" class="note-card">
        <div class="note-header">
            <h3 th:text="${note.title}">Title</h3>
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="note-date" th:text="${#temporals.format(note.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</span>
                <form th:action="@{/notes/delete}" method="post" style="margin:0;">
                    <input type="hidden" name="id" th:value="${note.id}">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
        <div class="note-content" th:text="${note.content}">Content</div>
    </div>
</body>
</html>
