server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:session_cookie_demo}
    username: ${DB_USER:session_cookie_demo}
    password: ${DB_PASSWORD:session-cookie-demo-lab-2026}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
